<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Smart — Concepts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  body { margin: 0; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="concept-a.jsx"></script>
<script type="text/babel" src="concept-b.jsx"></script>
<script type="text/babel" src="concept-c.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        title="Portfolio refresh — three directions"
        subtitle="Each artboard shows the hero + one section preview. Pick a direction (or remix) and I'll build it out as a full single-page site."
        gap={64}
      >
        <DCArtboard label="A · Editorial  →  cream, big Ubuntu headline, hairline rules" width={1280} height={1620}>
          <ConceptA />
        </DCArtboard>
        <DCArtboard label="B · Quiet Engineering  →  dark, terminal-adjacent, dense" width={1280} height={1620}>
          <ConceptB />
        </DCArtboard>
        <DCArtboard label="C · Signal  →  B's density + a generic data-signal band (not audio-specific)" width={1280} height={1620}>
          <ConceptC />
        </DCArtboard>
        <DCPostIt top={-30} left={100} rotate={-3} width={220}>
          Pan with two fingers · zoom with pinch / cmd+scroll
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
