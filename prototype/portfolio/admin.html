<body>
<div id="root"></div>
<script type="text/babel" src="admin/theme.jsx?v=1"></script>
<script type="text/babel" src="admin/primitives.jsx?v=1"></script>
<script type="text/babel" src="admin/sections-top.jsx?v=1"></script>
<script type="text/babel" src="admin/sections-items.jsx?v=1"></script>
<script type="text/babel">
// ----------- Admin app -----------
// Single-page profile editor. Fetches content.json on mount, edits happen
// in React state, with localStorage draft autosave. Actions: Preview (sets
// sw-content-override + opens /), Save draft, Download content.json, Reset.

// Client-side password gate. NOT real security — just a "don't let my sister
// mess with it" layer. Hash is SHA-256 of the password. Default password is
// literally "smartwatt" — change PASSWORD_HASH below to your own hash.
// To regenerate: await crypto.subtle.digest('SHA-256', new TextEncoder().encode('your-password')).then(b => Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, '0')).join(''))
const PASSWORD_HASH = '82979fec99002b647e997f525dc985d6aa86a362acbebcaf10c604946ea36a5e'; // "smartwatt"

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function Gate({ onUnlock }) {
  const [pw, setPw] = React.useState('');
  const [err, setErr] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const check = async (e) => {
    e.preventDefault();
    setLoading(true);
    try {
      const h = await sha256(pw);
      if (h === PASSWORD_HASH) {
        try { sessionStorage.setItem('sw-admin-unlocked', '1'); } catch {}
        onUnlock();
      } else {
        setErr('Nope.');
        setPw('');
      }
    } catch {
      setErr('Browser too old — need SubtleCrypto.');
    }
    setLoading(false);
  };
  return (
    <div style={{
      minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: t().bg, padding: 24,
    }}>
      <form onSubmit={check} style={{
        maxWidth: 380, width: '100%', background: t().card,
        border: `1px solid ${t().rule}`, borderRadius: 8,
        padding: 32, boxShadow: '0 4px 24px rgba(0,0,0,0.04)',
      }}>
        <div style={{
          fontFamily: MONO, fontSize: 11, color: t().accent,
          letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 10,
        }}>● profile editor</div>
        <h1 style={{ fontSize: 26, fontWeight: 500, letterSpacing: -0.5, margin: '0 0 10px' }}>Sign in to edit.</h1>
        <p style={{ color: t().muted, fontSize: 14, margin: '0 0 24px', lineHeight: 1.5 }}>
          This page lives next to your portfolio. Only you should have the password.
        </p>
        <label style={{ display: 'block', marginBottom: 16 }}>
          <div style={{
            fontFamily: MONO, fontSize: 10, color: t().muted,
            letterSpacing: 1, textTransform: 'uppercase', marginBottom: 8,
          }}>Password</div>
          <input type="password" autoFocus value={pw} onChange={e => { setPw(e.target.value); setErr(''); }} style={{
            width: '100%', padding: '12px 14px', fontFamily: SANS, fontSize: 16,
            background: t().bg, color: t().ink, border: `1px solid ${err ? '#c44' : t().rule}`,
            borderRadius: 4, outline: 'none',
          }} />
        </label>
        {err && <div style={{ color: '#c44', fontSize: 13, marginBottom: 14 }}>{err}</div>}
        <button type="submit" disabled={loading || !pw} style={{
          width: '100%', padding: '12px', background: t().ink, color: t().bg, border: 'none',
          fontFamily: MONO, fontSize: 12, letterSpacing: 1, textTransform: 'uppercase',
          borderRadius: 4, cursor: loading || !pw ? 'not-allowed' : 'pointer', opacity: loading || !pw ? 0.6 : 1,
        }}>{loading ? 'Checking…' : 'Unlock →'}</button>
      </form>
    </div>
  );
}

// ----------- Default content (for fresh admin, if content.json fetch fails) -----------
const EMPTY_CONTENT = {
  meta: { name: '', shortName: '', location: '', timezone: '', available: false, copyrightYear: new Date().getFullYear().toString() },
  hero: { indexNumber: '01', headlineLine1: '', headlineLine2: '', headlineLine3: '', intro: '', currently: '', openTo: '', stack: '' },
  signal: { caption: '' },
  work: [], experience: [], education: [],
  contact: { intro: '', methods: [] },
};

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
function deepEqual(a, b) { return JSON.stringify(a) === JSON.stringify(b); }

// ----------- Main editor -----------

function AdminApp() {
  const [mode, setModeRaw] = React.useState(() => {
    try { return localStorage.getItem('sw-admin-theme') || 'light'; } catch { return 'light'; }
  });
  const setMode = (m) => {
    setTheme(m);
    setModeRaw(m);
    try { localStorage.setItem('sw-admin-theme', m); } catch {}
  };
  React.useEffect(() => { setTheme(mode); document.body.style.background = t().bg; document.body.style.color = t().ink; }, [mode]);

  // Load initial content: draft → content.json → empty
  const [content, setContent] = React.useState(null);
  const [original, setOriginal] = React.useState(null); // snapshot of content.json as loaded
  const [savedAt, setSavedAt] = React.useState(null);
  const [toast, setToast] = React.useState('');

  React.useEffect(() => {
    // 1. draft
    let draft = null;
    try {
      const raw = localStorage.getItem('sw-admin-draft');
      if (raw) draft = JSON.parse(raw);
    } catch {}
    // 2. Baked-in fallback (works in sandboxed / file:// previews where XHR is blocked)
    let baked = null;
    try {
      const el = document.getElementById('content-baked');
      if (el) baked = JSON.parse(el.textContent);
    } catch {}

    // 3. content.json on disk (same-origin fetch — this is the source of truth in prod)
    const xhr = new XMLHttpRequest();
    xhr.onload = () => {
      let fromFile = null;
      if (xhr.status === 200 && xhr.responseText) {
        try { fromFile = JSON.parse(xhr.responseText); } catch {}
      }
      const orig = fromFile || baked || EMPTY_CONTENT;
      setOriginal(orig);
      setContent(draft || orig);
    };
    xhr.onerror = () => {
      const orig = baked || EMPTY_CONTENT;
      setOriginal(orig);
      setContent(draft || orig);
    };
    try { xhr.open('GET', 'content.json?t=' + Date.now(), true); xhr.send(); }
    catch { xhr.onerror(); }
  }, []);

  // Autosave draft on every change (debounced)
  React.useEffect(() => {
    if (!content) return;
    const id = setTimeout(() => {
      try { localStorage.setItem('sw-admin-draft', JSON.stringify(content)); setSavedAt(Date.now()); } catch {}
    }, 400);
    return () => clearTimeout(id);
  }, [content]);

  const update = React.useCallback((fn) => {
    setContent(prev => typeof fn === 'function' ? fn(prev) : fn);
  }, []);

  const dirty = content && original && !deepEqual(content, original);

  // --- Actions ---
  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(''), 2400);
  };

  const downloadJson = () => {
    const blob = new Blob([JSON.stringify(content, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'content.json'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 500);
    showToast('Downloaded content.json — commit it to your repo.');
  };

  const previewOnSite = () => {
    try { localStorage.setItem('sw-content-override', JSON.stringify(content)); } catch {}
    window.open('index.html', '_blank');
    showToast('Preview opened. The site is reading your edits from this browser.');
  };

  const clearPreview = () => {
    try { localStorage.removeItem('sw-content-override'); } catch {}
    showToast('Site override cleared. Site will now read content.json.');
  };

  const resetToFile = () => {
    if (!confirm('Discard all edits and revert to the last-saved content.json?')) return;
    setContent(deepClone(original));
    try { localStorage.removeItem('sw-admin-draft'); } catch {}
    showToast('Reset to content.json.');
  };

  const logout = () => {
    try { sessionStorage.removeItem('sw-admin-unlocked'); } catch {}
    window.location.reload();
  };

  if (!content) {
    return <div style={{ padding: 40, textAlign: 'center', color: t().muted, fontFamily: MONO, fontSize: 12 }}>Loading your profile…</div>;
  }

  return (
    <div style={{ minHeight: '100vh', background: t().bg, color: t().ink }}>
      {/* Top bar */}
      <div style={{
        position: 'sticky', top: 0, zIndex: 20,
        background: `${t().bg}ee`, backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)',
        borderBottom: `1px solid ${t().rule}`,
      }}>
        <div style={{
          maxWidth: 960, margin: '0 auto', padding: '14px 24px',
          display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap',
        }}>
          <div style={{
            fontFamily: MONO, fontSize: 11, color: t().accent,
            letterSpacing: 1.5, textTransform: 'uppercase',
          }}>● editing</div>
          <div style={{ fontSize: 15, fontWeight: 500, flex: 1, minWidth: 0 }}>
            {content.meta && content.meta.name ? content.meta.name : 'Your profile'}
            <span style={{ color: t().muted, fontWeight: 400, marginLeft: 10, fontSize: 13 }}>
              {dirty ? '· unpublished changes' : '· up to date'}
              {savedAt && <span style={{ marginLeft: 8, fontFamily: MONO, fontSize: 11, color: t().mutedSoft }}>
                draft saved
              </span>}
            </span>
          </div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            <Btn variant="ghost" onClick={() => setMode(mode === 'light' ? 'dark' : 'light')} title="Theme">
              {mode === 'light' ? '◐' : '◑'}
            </Btn>
            <Btn variant="default" onClick={resetToFile} disabled={!dirty} title="Revert to last-saved content.json">Reset</Btn>
            <Btn variant="default" onClick={previewOnSite}>Preview →</Btn>
            <Btn variant="accent" onClick={downloadJson}>Download JSON ↓</Btn>
            <Btn variant="ghost" onClick={logout} title="Sign out">⎋</Btn>
          </div>
        </div>
      </div>

      {/* Body */}
      <div style={{ maxWidth: 960, margin: '0 auto', padding: '28px 24px 80px' }}>
        {/* Profile header */}
        <div style={{ marginBottom: 28, paddingBottom: 20, borderBottom: `1px solid ${t().rule}` }}>
          <div style={{
            fontFamily: MONO, fontSize: 10, color: t().muted,
            letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 10,
          }}>Your profile · edit like a resume, publish when ready</div>
          <h1 style={{ fontSize: 34, fontWeight: 300, letterSpacing: -1.2, margin: '0 0 12px' }}>
            Hello, <span style={{ fontWeight: 500 }}>{content.meta && content.meta.name ? content.meta.name.split(' ')[0] : 'there'}</span>.
          </h1>
          <p style={{ color: t().muted, fontSize: 15, margin: 0, maxWidth: 620, lineHeight: 1.55 }}>
            Update any section below. Changes autosave as a draft in this browser. When you're happy,
            hit <strong style={{ color: t().ink, fontWeight: 500 }}>Download JSON</strong> and commit
            the new <code style={{ background: t().bgAlt, padding: '1px 6px', borderRadius: 2 }}>content.json</code> to
            your repo — the site will pick it up on the next deploy.
          </p>
          {dirty && (
            <div style={{
              marginTop: 18, padding: '12px 16px', background: t().accentDim,
              border: `1px solid ${t().accent}33`, borderRadius: 4,
              fontSize: 13, color: t().ink, display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap',
            }}>
              <span style={{
                fontFamily: MONO, fontSize: 10, color: t().accent,
                letterSpacing: 1, textTransform: 'uppercase',
              }}>● unpublished</span>
              <span style={{ flex: 1 }}>You have edits that aren't in <code>content.json</code> yet.</span>
              <Btn variant="accent" onClick={downloadJson} style={{ padding: '6px 12px' }}>Download JSON ↓</Btn>
            </div>
          )}
        </div>

        <BasicsSection content={content} update={update} />
        <StatusSection content={content} update={update} />
        <WorkSection content={content} update={update} />
        <ExperienceSection content={content} update={update} />
        <EducationSection content={content} update={update} />
        <ContactSection content={content} update={update} />

        {/* Publishing footer */}
        <div style={{
          marginTop: 40, padding: '24px', background: t().card,
          border: `1px solid ${t().rule}`, borderRadius: 6,
        }}>
          <div style={{
            fontFamily: MONO, fontSize: 10, color: t().muted,
            letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 12,
          }}>Publishing</div>
          <div style={{ fontSize: 14, color: t().muted, lineHeight: 1.6, marginBottom: 16 }}>
            <strong style={{ color: t().ink }}>Preview</strong> applies your edits to the live site in
            this browser only (via localStorage). Share-able only to you.<br/>
            <strong style={{ color: t().ink }}>Download JSON</strong> saves <code>content.json</code> —
            replace the file in your repo to publish.
          </div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <Btn variant="default" onClick={previewOnSite}>Preview on site →</Btn>
            <Btn variant="ghost" onClick={clearPreview} title="Remove the localStorage override so the site reads content.json again">Clear site preview</Btn>
            <Btn variant="accent" onClick={downloadJson}>Download content.json ↓</Btn>
          </div>
        </div>
      </div>

      {/* Toast */}
      {toast && (
        <div style={{
          position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
          background: t().ink, color: t().bg, padding: '12px 18px', borderRadius: 4,
          fontSize: 13, boxShadow: '0 4px 16px rgba(0,0,0,0.2)', zIndex: 100,
          fontFamily: SANS, maxWidth: 480,
        }}>{toast}</div>
      )}
    </div>
  );
}

// ----------- Root: gate or app -----------
function Root() {
  const [unlocked, setUnlocked] = React.useState(() => {
    try { return sessionStorage.getItem('sw-admin-unlocked') === '1'; } catch { return false; }
  });
  return unlocked ? <AdminApp /> : <Gate onUnlock={() => setUnlocked(true)} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
