// Content loader — priority: localStorage override (admin preview) > content.json > inline fallback.
// Blocks before React renders so CONTENT is guaranteed available.
(function loadContent() {
  var fallback = {};
  try { fallback = JSON.parse(document.getElementById('content-fallback').textContent); } catch (e) {}
  window.CONTENT = fallback;
  // 1. localStorage override (set by admin.html preview button or "Apply to site")
  try {
    var stored = localStorage.getItem('sw-content-override');
    if (stored) {
      var parsed = JSON.parse(stored);
      if (parsed && typeof parsed === 'object') {
        window.CONTENT = parsed;
        window.__contentSource = 'localStorage';
        return;
      }
    }
  } catch (e) {}
  // 2. Fetch content.json (sync XHR to run before React mount — small file)
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'content.json?t=' + Date.now(), false);
    xhr.send();
    if (xhr.status === 200 || xhr.status === 0) {
      var data = JSON.parse(xhr.responseText);
      if (data && typeof data === 'object') {
        window.CONTENT = data;
        window.__contentSource = 'content.json';
        return;
      }
    }
  } catch (e) {}
  window.__contentSource = 'fallback';
})();
</script>

<script type="text/babel">
function App() {
  const [mode, setMode] = React.useState(() => {
    try { return localStorage.getItem('sw-theme') || 'light'; } catch { return 'light'; }
  });
  // Listen for admin-page preview updates via postMessage or storage events
  const [content, setContent] = React.useState(window.CONTENT);
  React.useEffect(() => {
    const onStorage = (e) => {
      if (e.key === 'sw-content-override' && e.newValue) {
        try { setContent(JSON.parse(e.newValue)); } catch {}
      }
    };
    const onMessage = (e) => {
      if (e.data && e.data.type === 'sw-preview-content' && e.data.content) {
        setContent(e.data.content);
      }
    };
    window.addEventListener('storage', onStorage);
    window.addEventListener('message', onMessage);
    return () => {
      window.removeEventListener('storage', onStorage);
      window.removeEventListener('message', onMessage);
    };
  }, []);
  React.useEffect(() => {
    try { localStorage.setItem('sw-theme', mode); } catch {}
    document.body.style.background = THEME[mode].bg;
    document.body.style.color = THEME[mode].ink;
  }, [mode]);
  const t = THEME[mode];
  return (
    <ThemeContext.Provider value={t}>
      <ContentContext.Provider value={content}>
        <div style={{
          background: t.bg, color: t.ink, minHeight: '100vh',
          transition: 'background 0.4s, color 0.4s',
        }}>
          <Nav mode={mode} setMode={setMode} />
          <Hero />
          <SignalBand />
          <Work />
          <Experience />
          <Education />
          <Contact />
          <Footer />
        </div>
      </ContentContext.Provider>
    </ThemeContext.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
